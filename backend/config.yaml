# ============================================================
# backend/config.yaml
# 项目配置文件：服务、深度相机、重建、检测等所有参数
# ============================================================

# -------------------------------------------
# 服务配置
# -------------------------------------------
server:
  host: "0.0.0.0"              # 监听地址
  port: 8000                    # 监听端口

# -------------------------------------------
# RGB 相机内参（奥比中光 Astra Pro 彩色相机）
# -------------------------------------------
rgb_camera:
  width: 1280                   # 图像宽度 (px)
  height: 720                   # 图像高度 (px)
  fx: 0.0                       # x 方向焦距 (px)
  fy: 0.0                       # y 方向焦距 (px)
  cx: 0.0                       # 主点 x 坐标 (px)
  cy: 0.0                       # 主点 y 坐标 (px)
  fps: 30                       # 帧率

# -------------------------------------------
# 深度相机内参（用于深度图 → 点云转换，针孔模型）
# Z = d / depth_scale
# X = (u - cx) * Z / fx
# Y = (v - cy) * Z / fy
# -------------------------------------------
depth_camera:
  width: 640                    # 深度图宽度 (px)
  height: 480                   # 深度图高度 (px)
  fx: 0.0                       # x 方向焦距 (px)
  fy: 0.0                       # y 方向焦距 (px)
  cx: 0.0                       # 主点 x 坐标 (px)
  cy: 0.0                       # 主点 y 坐标 (px)
  fps: 30                       # 帧率
  hfov: 58.4                    # 水平视场角 (度)
  vfov: 45.5                    # 垂直视场角 (度)

# -------------------------------------------
# 深度数据处理
# -------------------------------------------
depth:
  min_depth: 0.6                # 最小有效深度 (m), Astra Pro 盲区
  max_depth: 8.0                # 最大有效深度 (m)
  depth_scale: 1000             # 深度值转换系数, 原始值 / scale = 米

# -------------------------------------------
# 深度相机 → 小车 外参（安装位姿）
# 将相机坐标系下的点云转换到小车坐标系
# 相机坐标系: Z 向前(出镜头方向), X 向右, Y 向下 (OpenCV 惯例)
# 小车坐标系: X 向前, Y 向左, Z 向上 (ROS 惯例)
# -------------------------------------------
camera_to_vehicle:
  rotation: [0.0, 0.0, 0.0]     # 欧拉角 (roll, pitch, yaw) 度, 相机 → 小车
  translation: [0.0, 0.0, 0.0]  # 平移 (x, y, z) m, 相机光心在小车坐标系中的位置

# -------------------------------------------
# 重建参数
# -------------------------------------------
reconstruction:
  mode: "incremental"           # "full" 全量重建 / "incremental" 增量重建
  frame_threshold: 30           # 累积多少帧触发一次重建
  voxel_size: 0.01              # 点云降采样体素大小 (m), 深度相机点云密集，体素宜小

# -------------------------------------------
# 位置估计器
# -------------------------------------------
estimation:
  initial_x: 0.0               # 初始 x 坐标 (m)
  initial_y: 0.0               # 初始 y 坐标 (m)
  initial_heading: 0.0         # 初始航向角 (度), 0 = 正前方
  wheelbase: 2.0               # 车辆轴距 (m), 影响转弯半径
  max_history: 10000            # 最大轨迹存储点数, 超出后丢弃旧数据

# -------------------------------------------
# YOLO 检测参数
# -------------------------------------------
detection:
  model_path: "models/yolo.pt"  # 模型文件路径
  conf_threshold: 0.5           # 置信度阈值
  device: "cuda"                # 推理设备: "cuda" / "cpu"
