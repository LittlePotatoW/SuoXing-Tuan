# ============================================================
# Frontend 配置文件 — 复制为 config.yaml 并修改实际地址
# ============================================================

# 后端服务 (Python FastAPI)
backend:
  host: localhost
  port: 8000

# 数据中继站 (TranspondServer C++)
transpond:
  host: localhost
  port: 8001

# 控制服务器 (Control_Server C++)
control:
  host: 127.0.0.1
  port: 8080

# HTTP 请求超时 (毫秒)
timeout:
  backend_ms: 30000
  transpond_ms: 30000
