# ============================================================
# frontend/config.yaml
# 前端配置文件：网络模式、数据源、后端、预处理、保存
# ============================================================

# -------------------------------------------
# 网络模式: "lan" 局域网直连 / "server" 服务器中转
# -------------------------------------------
network:
  mode: "lan"                    # 默认模式

# -------------------------------------------
# 遥测数据源 (speed + steering, 10Hz, WS)
# -------------------------------------------
telemetry:
  lan:
    host: "192.168.1.100"       # 局域网小车 IP
    port: 8001                   # 遥测 WS 端口
  server:
    host: "192.168.1.100" # 中转服务器地址
    port: 8001

# -------------------------------------------
# 深度相机数据源 (RGB + depth map, WS)
# -------------------------------------------
frame:
  lan:
    host: "192.168.1.100"       # 局域网相机 IP (默认和小车同一台)
    port: 8002                   # 帧数据 WS 端口
  server:
    host: "192.168.1.100"   # 中转服务器地址 (可能和遥测不同)
    port: 8002

# -------------------------------------------
# 后端 API 地址 (HTTP)
# -------------------------------------------
backend:
  host: "127.0.0.1"             # 后端地址（永远只有一个）
  port: 8000

# -------------------------------------------
# 重建参数（前端默认值，与 backend/config.yaml 同步）
# -------------------------------------------
reconstruction:
  mode: "incremental"           # "full" / "incremental"
  frame_threshold: 30           # 累积帧数触发重建
  voxel_size: 0.01              # 体素降采样大小 (m)

# -------------------------------------------
# 位置估计（前端默认值，与 backend/config.yaml 同步）
# "bicycle" 自行车模型 / "constant" 匀速直线 / "rgbd" 视觉里程计 / "fusion" EKF融合
# -------------------------------------------
estimation:
  mode: "bicycle"
  wheelbase: 2.0                # 轴距 (m)
  constant_speed: 1.0           # 匀速模式默认速度 (m/s)
  fusion_weight: 0.5            # EKF 融合权重
  initial_x: 0.0                # 初始 x (m)
  initial_y: 0.0                # 初始 y (m)
  initial_heading: 0.0          # 初始航向角 (度)

# -------------------------------------------
# 数据轮询间隔 (ms)
# -------------------------------------------
poll_interval: 1000

# -------------------------------------------
# 图像预处理 (默认都不处理)
# flip: "none" / "h" / "v" / "hv"
# crop: null 或 { x, y, w, h }
# resize: null 或 { w, h }
# -------------------------------------------
preprocess:
  image:
    flip: "none"
    crop: null
    resize: null
    quality: 0.85               # JPEG 质量
  depth:
    flip: "none"
    crop: null

# -------------------------------------------
# 数据保存
# -------------------------------------------
save:
  path: "./sessions"            # 保存根目录
  auto_save: false               # 是否自动保存
