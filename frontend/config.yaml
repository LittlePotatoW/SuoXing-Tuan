# ============================================================
# frontend/config.yaml
# 前端配置文件：网络模式、数据源、后端、预处理、保存
# ============================================================

# -------------------------------------------
# 网络模式: "lan" 局域网直连 / "server" 服务器中转
# -------------------------------------------
network:
  mode: "lan"                    # 默认模式

# -------------------------------------------
# 遥测数据源 (speed + steering, 10Hz, WS)
# -------------------------------------------
telemetry:
  lan:
    host: "192.168.1.100"       # 局域网小车 IP
    port: 8001                   # 遥测 WS 端口
  server:
    host: "telemetry.example.com" # 中转服务器地址
    port: 8001

# -------------------------------------------
# 深度相机数据源 (RGB + depth map, WS)
# -------------------------------------------
frame:
  lan:
    host: "192.168.1.101"       # 局域网相机 IP (可能和小车同一台)
    port: 8002                   # 帧数据 WS 端口
  server:
    host: "frame.example.com"   # 中转服务器地址 (可能和遥测不同)
    port: 8002

# -------------------------------------------
# 后端 API 地址 (HTTP)
# -------------------------------------------
backend:
  lan:
    host: "127.0.0.1"           # 本地后端
    port: 8000
  server:
    host: "api.example.com"     # 远程后端
    port: 8000

# -------------------------------------------
# 数据轮询间隔 (ms)
# -------------------------------------------
poll_interval: 1000

# -------------------------------------------
# 图像预处理 (默认都不处理)
# flip: "none" / "h" / "v" / "hv"
# crop: null 或 { x, y, w, h }
# resize: null 或 { w, h }
# -------------------------------------------
preprocess:
  image:
    flip: "none"
    crop: null
    resize: null
    quality: 0.85               # JPEG 质量
  depth:
    flip: "none"
    crop: null

# -------------------------------------------
# 数据保存
# -------------------------------------------
save:
  path: "./sessions"            # 保存根目录
  auto_save: false               # 是否自动保存
