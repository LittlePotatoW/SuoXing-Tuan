# =============================================================================
# LiDAR-Camera Fusion: 参数配置文件
# =============================================================================
#
# ★ 这是整个项目中唯一需要编辑的文件 —— 所有算法代码都在 .py 中，
#   日常使用只需修改本文件的数值，无需动任何 Python 代码。
#
# ★ 修改标记说明：
#   [必改] = 必须替换为真实传感器标定值，否则投影结果错误
#   [可选] = 有合理默认值，可根据需要调整
#
# ★ 快速体验（零配置，自动合成数据）：
#   python main.py --demo
#
# ★ 用法：
#   1. 按下方标记修改参数
#   2. 将点云和图像文件放入 data/ 目录
#   3. python main.py
# =============================================================================

# -----------------------------------------------------------------------------
# 输入数据路径  [必改] — 指向你的真实数据文件
# -----------------------------------------------------------------------------
input:
  pointcloud_path: "./data/pointcloud.pcd"   # [必改] 点云文件路径 (*.pcd 或 *.bin)
  image_path:      "./data/image.jpg"         # [必改] 图片文件路径 (*.jpg 或 *.png)

# -----------------------------------------------------------------------------
# 输出配置
# -----------------------------------------------------------------------------
output:
  result_path: "./output/fusion_result.jpg"   # 融合结果保存路径
  save_colored_pcd: false                     # 是否额外保存带颜色信息的点云 (*.pcd)

# -----------------------------------------------------------------------------
# 相机参数  [必改] — 内参和畸变系数必须来自你的相机标定结果
# -----------------------------------------------------------------------------
camera:
  image_width:  1920       # [必改] 图像宽度 (像素)
  image_height: 1080       # [必改] 图像高度 (像素)

  # 相机内参矩阵 K (3x3)
  #   [ fx   0  cx ]
  #   [  0  fy  cy ]
  #   [  0   0   1 ]
  K:                       # [必改] 替换为你的相机标定结果
    - [1200.0,    0.0, 960.0]   # fx, 0, cx
    - [   0.0, 1200.0, 540.0]   # 0, fy, cy
    - [   0.0,    0.0,   1.0]   # 0,  0,  1

  # 畸变系数 (OpenCV 标准: k1, k2, p1, p2, k3)
  #   - 径向畸变: k1, k2, k3
  #   - 切向畸变: p1, p2
  dist_coeff: [-0.35, 0.12, 0.0, 0.0, -0.02]  # [必改] 替换为你的畸变系数

# -----------------------------------------------------------------------------
# 激光雷达参数（参考 LT-R1 产品规格书）  [可选] — 一般无需修改
# -----------------------------------------------------------------------------
lidar:
  model: "LT-R1"                    # 激光雷达型号
  laser_wavelength: 905             # 激光波长 (nm)
  max_range: 25.0                   # 最大探测距离 (m)
  min_range: 0.1                    # 最小探测距离 (m)，用于过滤近场噪点
  horizontal_fov: 270.0             # 水平视场角 (deg)
  scan_frequency: 10.0              # 扫描频率 (Hz)
  angle_resolution: 0.12            # 角度分辨率 (deg)
  distance_accuracy: 0.02           # 距离精度 (m)
  data_rate: 30000                  # 数据速率 (kHz → Hz)

# -----------------------------------------------------------------------------
# 外参：激光雷达 → 相机 (LiDAR → Camera)  [必改] — 标定结果的核心
#
# ★ 三种填写方式（三选一，通过对应的 use_xxx: true 激活）：
#   方式一：四元数   — 与 SuoXing-Tuan Pose6DoF / CameraView 原生兼容
#   方式二：欧拉角   — 直观易懂 (ZYX 顺序)
#   方式三：旋转矩阵 — 最通用，直接填入标定结果
# -----------------------------------------------------------------------------
extrinsic:
  # ----- 方式一：四元数（推荐 — 与 SuoXing-Tuan 数据模型兼容）-----
  use_quaternion: false
  quaternion:
    qw: 1.0              # 实部
    qx: 0.0              # i 分量
    qy: 0.0              # j 分量
    qz: 0.0              # k 分量

  # ----- 方式二：欧拉角 (roll, pitch, yaw)，单位：弧度 -----
  # 旋转顺序：ZYX (yaw → pitch → roll)
  use_euler: false
  euler:
    roll:  0.0             # 绕 X 轴旋转 (rad)
    pitch: 0.0             # 绕 Y 轴旋转 (rad)
    yaw:   0.0             # 绕 Z 轴旋转 (rad)

  # ----- 方式三：直接填写旋转矩阵 R (3x3) -----
  R:
    - [ 0.0, -1.0,  0.0]   # 第 1 行
    - [ 0.0,  0.0, -1.0]   # 第 2 行
    - [ 1.0,  0.0,  0.0]   # 第 3 行

  # 平移向量 T (tx, ty, tz)，单位：米
  # LiDAR 坐标系原点在相机坐标系中的位置
  T: [0.0, 0.0, 0.0]      # [tx, ty, tz]

# -----------------------------------------------------------------------------
# 可视化参数  [可选] — 调整显示效果
# -----------------------------------------------------------------------------
visualization:
  point_radius: 2            # 投影点的半径 (像素)
  color_map: "distance"      # 着色模式: "distance" (按距离) / "intensity" (按强度) / "solid" (单色)
  solid_color: [0, 255, 0]  # 当 color_map 为 "solid" 时的颜色 (BGR)
  alpha: 0.6                 # 点云覆盖透明度 (0.0 ~ 1.0)，越小越透明
  show_distance_legend: true # 是否显示距离颜色图例

# -----------------------------------------------------------------------------
# 点云过滤参数（可选，用于裁剪无效点）
# -----------------------------------------------------------------------------
filter:
  enable_range_filter: true   # 是否启用距离过滤
  range_min: 0.1              # 最小保留距离 (m)
  range_max: 25.0             # 最大保留距离 (m)，建议与 lidar.max_range 一致
  enable_fov_filter: true     # 是否启用视场角过滤（仅保留相机前方的点）
